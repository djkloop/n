services:
  cybertruckai-pages:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GIT_SHA: ${NEXT_PUBLIC_GIT_SHA:-local}
    container_name: cybertruckai-pages
    restart: unless-stopped
    ports:
      - "8667:8667"
    environment:
      NODE_ENV: production
      PORT: 8667
      HOSTNAME: 0.0.0.0
